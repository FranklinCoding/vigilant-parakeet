services:
  # ─────────────────────────────────────────
  # Web Service (Node.js / Express + React)
  # ─────────────────────────────────────────
  - type: web
    name: vaultdeal-app
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    autoDeploy: true

    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 10000

      # Injected automatically by Render when DB is linked
      - key: DATABASE_URL
        fromDatabase:
          name: vaultdeal-db
          property: connectionString

      # Steam Web API Key — set manually in Render dashboard
      - key: STEAM_API_KEY
        sync: false

      # ITAD API Key — set manually in Render dashboard (optional for Phase 1)
      - key: ITAD_API_KEY
        sync: false

      # App base URL — used for OAuth callbacks, emails, etc.
      - key: APP_BASE_URL
        sync: false

      # JWT secret for future user auth
      - key: JWT_SECRET
        generateValue: true

      # Session secret
      - key: SESSION_SECRET
        generateValue: true

      # Future: SendGrid or Resend for price alert emails
      - key: EMAIL_API_KEY
        sync: false

      - key: EMAIL_FROM
        sync: false

  # ─────────────────────────────────────────
  # Price Sync Worker (Cron Job)
  # Runs every 3 hours to refresh deal data
  # ─────────────────────────────────────────
  - type: cron
    name: vaultdeal-price-sync
    runtime: node
    region: oregon
    rootDir: .
    buildCommand: cd server && npm install
    startCommand: node server/jobs/syncPrices.js
    schedule: "0 */3 * * *"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: vaultdeal-db
          property: connectionString
      - key: STEAM_API_KEY
        sync: false
      - key: ITAD_API_KEY
        sync: false

  # ─────────────────────────────────────────
  # Steam Store Catalog Sync (Cron Job)
  # Runs every 3 hours — pulls top sellers,
  # new releases, specials & top-rated from Steam
  # ─────────────────────────────────────────
  - type: cron
    name: vaultdeal-steam-sync
    runtime: node
    region: oregon
    rootDir: .
    buildCommand: cd server && npm install
    startCommand: node server/jobs/syncSteamStore.js
    schedule: "0 */3 * * *"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: vaultdeal-db
          property: connectionString
      - key: STEAM_API_KEY
        sync: false

  # ─────────────────────────────────────────
  # Epic Games Store Sync (Cron Job)
  # Runs every 6 hours — pulls free + on-sale
  # games from Epic (no API key required)
  # ─────────────────────────────────────────
  - type: cron
    name: vaultdeal-epic-sync
    runtime: node
    region: oregon
    rootDir: .
    buildCommand: cd server && npm install
    startCommand: node server/jobs/syncEpicStore.js
    schedule: "0 */6 * * *"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: vaultdeal-db
          property: connectionString

databases:
  # ─────────────────────────────────────────
  # PostgreSQL (Render Managed)
  # ─────────────────────────────────────────
  - name: vaultdeal-db
    plan: free
    region: oregon
    databaseName: vaultdeal
    user: vaultdeal_user